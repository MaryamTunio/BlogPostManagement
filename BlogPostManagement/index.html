<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog UI</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="topbar">
    <h2>Blog it.</h2>
</header>

<div class="container">

    <div class="card form-card">

        <div class="card-header">
            <h3>New Post</h3>
        </div>

        <form id="blogForm">

            <label>Title *</label>
            <input type="text" id="title" placeholder="Give your post a title...">

            <label>Author *</label>
            <input type="text" id="author" placeholder="Your name...">

            <label>Publication Date *</label>
            <input type="date" id="date">

            <label>Content *</label>
            <textarea id="content" rows="6" placeholder="Write your post content here..."></textarea>

            <button type="submit"> Publish Post</button>

        </form>

    </div>

    <div class="card preview-card">

        <div class="card-header">
            <h3>Live Preview</h3>
        </div>

        <p class="date" id="previewDate">June 11, 2026</p>

        <h1 id="previewTitle">Untitled Post</h1>

        <p id="previewContent">Start writing to see preview...</p>

        <div class="author">
            <span>●</span>
            <p id="previewAuthor">Anonymous</p>
        </div>

    </div>

</div>

<div class="container2">

    <h2>Published Posts</h2>

    <div id="postsContainer"></div>

</div>

<script src="script.js"></script>

</body>
</html>
